<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 8px 32px rgba(30, 60, 120, 0.12);
    }
    h1 {
      color: #1B72BE;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .add-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #D0DDEF;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .add-form input:focus { border-color: #1B72BE; }
    .add-form button {
      padding: 12px 22px;
      background: #1B72BE;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-form button:hover { background: #155a9a; }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #f7f9ff;
      border: 1px solid #e4eaf5;
      transition: box-shadow 0.2s;
    }
    .task-item:hover { box-shadow: 0 2px 12px rgba(27,114,190,0.08); }
    .task-item.done-item { background: #f0fff8; border-color: #b2ecd4; }
    .task-text { font-size: 15px; color: #222; }
    .task-text.done-text { text-decoration: line-through; color: #aaa; }
    .actions { display: flex; gap: 8px; }
    .btn-done {
      padding: 6px 14px;
      background: #00C896;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-done:hover { background: #00a87e; }
    .btn-delete {
      padding: 6px 14px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #cc0000; }
    .empty {
      text-align: center;
      color: #bbb;
      font-size: 15px;
      padding: 30px 0;
    }
    .count {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <p class="subtitle">Stay organised. Get things done.</p>
    <form class="add-form" action="/add" method="POST">
      <input type="text" name="task" placeholder="Add a new task..." required />
      <button type="submit">+ Add</button>
    </form>
    <p class="count">{{ tasks|length }} task{{ 's' if tasks|length != 1 else '' }}</p>
    <ul class="task-list">
      {% for task in tasks %}
      <li class="task-item {{ 'done-item' if task.done else '' }}">
        <span class="task-text {{ 'done-text' if task.done else '' }}">{{ task.text }}</span>
        <div class="actions">
          {% if not task.done %}
          <a href="/done/{{ loop.index0 }}"><button class="btn-done">✓ Done</button></a>
          {% endif %}
          <a href="/delete/{{ loop.index0 }}"><button class="btn-delete">✕ Delete</button></a>
        </div>
      </li>
      {% endfor %}
      {% if not tasks %}
      <li class="empty">No tasks yet. Add one above! 🎯</li>
      {% endif %}
    </ul>
  </div>
</body>
</html>
